---
- name: nextcloud operations
  block:
    - name: Stop and remove Nextcloud compose stack (if present)
      community.docker.docker_compose_v2:
        project_src: "{{ DOCKERDIR }}"
        files:
          - "{{ DOCKERDIR }}/docker-compose.nextcloud.yml"
        state: absent
      when: nextcloud_reset | default(false)
      ignore_errors: true
      tags:
        - nextcloud_reset

    - name: Ensure any remaining Nextcloud containers are removed (best-effort)
      community.docker.docker_container:
        name: "{{ item }}"
        state: absent
        force_kill: true
      loop:
        - nextcloud-app
        - nextcloud-db
      when: nextcloud_reset | default(false)
      ignore_errors: true
      tags:
        - nextcloud_reset

    - name: Remove Nextcloud appdata directory
      become: true
      file:
        path: "{{ DOCKERDIR }}/appdata/nextcloud"
        state: absent
      when: nextcloud_reset | default(false)
      tags:
        - nextcloud_reset

    - name: Create nextcloud directories with correct permissions
      become: true
      file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner | default(bootstrap_admin_user) }}"
        group: "{{ item.group | default(bootstrap_admin_user) }}"
        mode: "{{ item.mode | default('0775') }}"
      loop:
        - { path: "{{DOCKERDIR}}/appdata/nextcloud/config", mode: "0775" }
        - { path: "{{DOCKERDIR}}/appdata/nextcloud/data", mode: "0775" }
        - { path: "{{DOCKERDIR}}/appdata/nextcloud/db", mode: "0775" }
      tags:
        - directories
  tags:
    - nextcloud
