## create vm 
- name: Ensure prod-app VM exists on Proxmox
  import_role:
    name: ansible-role-proxmox-vm
  vars:
    vm_name: prod-app
    vm_cores: 8
    vm_memory: 16384  # 16 GB in MB
    vm_disk_size: 120G
    # Network
    vm_ip: "192.168.14.54"
    vm_gateway: "192.168.14.1"
    vm_dns: "192.168.14.6"
  tags: proxmox

