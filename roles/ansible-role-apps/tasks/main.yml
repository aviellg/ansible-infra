---
# ansible-role-apps/tasks/main.yml
# Pure application deployment logic. Targets the host it is assigned to.
# Orchestration (provisioning + setup) is handled by the playbook.

- name: Setup base prerequisites and directories
  ansible.builtin.import_tasks: setup_base.yml

- name: Setup socket proxy configuration
  ansible.builtin.include_tasks: setup_socket_proxy.yml
  when: "'socket-proxy' in enabled_apps"

- name: Setup traefik configuration
  ansible.builtin.include_tasks: setup_traefik.yml
  when: "'traefik' in enabled_apps"

- name: Setup authentik configuration
  ansible.builtin.include_tasks: setup_authentik.yml
  when: "'authentik' in enabled_apps"

- name: Setup cloudflare DDNS configuration
  ansible.builtin.include_tasks: setup_cloudflare_ddns.yml
  when: "'cloudflare-ddns' in enabled_apps"

- name: Setup nextcloud configuration
  ansible.builtin.include_tasks: setup_nextcloud.yml
  when: "'nextcloud' in enabled_apps"

- name: Deploy enabled apps via docker compose
  ansible.builtin.import_tasks: deploy.yml